<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Evaluaciones</title>

  <link rel="stylesheet" href="Entrenadores.css">

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="header">
  <h1>Dashboard de Evaluaciones</h1>
  <button onclick="generarPDF()">Descargar PDF</button>
</div>

<div class="container">

  <div class="card">
    <h2 id="bienvenida"></h2>
  </div>

  <div class="card">
    <h2>Empleados</h2>
    <div id="empleados"></div>
  </div>

  <div class="card">
    <h2 id="nombreEmpleado"></h2>
    <div class="chart-container">
      <canvas id="grafica"></canvas>
    </div>
  </div>

  <div class="card">
    <h2>Áreas</h2>
    <div id="areas"></div>
  </div>

  <div class="card" id="zonaPDF">
    <h2 id="tituloExamen"></h2>
    <div id="detalleExamen"></div>
  </div>

</div>

<script src="supabase.js"></script>

<script src="entrenadores.js"></script>

</body>
</html>
